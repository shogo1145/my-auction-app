<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Private Auction — My Page</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px 60px;
        }
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 16px 24px;
        }
        .section-title {
            font-size: 1.3em;
            color: var(--text-primary);
            margin-bottom: 20px;
            font-family: var(--font-serif);
            border-bottom: 2px solid var(--gold-primary);
            padding-bottom: 8px;
            display: inline-block;
        }
        .purchase-card {
            background: #ffffff;
            border-radius: var(--radius-md);
            border: 1px solid rgba(184, 134, 11, 0.2);
            padding: 20px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: 120px 1fr auto;
            gap: 20px;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transition: transform 0.2s ease;
        }
        .purchase-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(184, 134, 11, 0.1);
        }
        @media (max-width: 768px) {
            .purchase-card {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .purchase-img-box {
                margin: 0 auto;
            }
            .purchase-actions {
                text-align: center !important;
            }
        }
        .purchase-img-box {
            width: 120px;
            height: 120px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .purchase-img-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .purchase-info h3 {
            font-size: 1.1em;
            color: var(--text-primary);
            margin-bottom: 6px;
        }
        .purchase-meta {
            font-size: 0.85em;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .purchase-memo {
            font-size: 0.8em;
            color: var(--text-muted);
            background: rgba(184, 134, 11, 0.05);
            padding: 6px 10px;
            border-radius: 4px;
            border-left: 3px solid var(--gold-primary);
            text-align: left;
        }
        .purchase-actions {
            text-align: right;
        }
        .price-tag {
            font-size: 1.3em;
            font-weight: 800;
            color: var(--emerald-green);
            margin-bottom: 4px;
        }
        .price-usd {
            font-size: 0.8em;
            color: var(--text-muted);
            font-weight: 600;
        }
        .total-summary {
            background: var(--gold-gradient);
            color: #ffffff;
            padding: 20px 24px;
            border-radius: var(--radius-md);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(184, 134, 11, 0.3);
        }
        .total-summary-value {
            font-size: 1.8em;
            font-weight: 800;
            font-family: var(--font-serif);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-bar glass-panel animate-slide-up">
            <div>
                <span class="badge badge-gold">MY PAGE</span>
                <h2 class="font-serif" style="margin-top: 4px; font-size: 1.2em;" id="client-name-display">落札履歴・購入商品一覧</h2>
            </div>
            <button onclick="location.href='auction.html'" class="btn btn-secondary" style="padding: 8px 16px; font-size: 0.85em;">← オークション会場へ戻る</button>
        </div>

        <div class="total-summary animate-fade-in">
            <div>
                <div style="font-size: 0.85em; opacity: 0.9; text-transform: uppercase; letter-spacing: 0.05em;">Total Won Amount (落札総額)</div>
                <div style="font-size: 0.8em; opacity: 0.8;" id="total-items-count">0 items won</div>
            </div>
            <div style="text-align: right;">
                <div class="total-summary-value" id="total-amount-jpy">¥0</div>
                <div style="font-size: 0.9em; opacity: 0.9;" id="total-amount-usd">($0)</div>
            </div>
        </div>

        <div class="animate-fade-in" style="animation-delay: 0.1s;">
            <h3 class="section-title">落札商品一覧</h3>
            <div id="purchases-list">
                <div style="text-align: center; color: var(--text-muted); padding: 40px;">読み込み中...</div>
            </div>
        </div>
    </div>

    <script>
        let exchangeRate = 150;
        let currentClient = null;

        async function init() {
            const saved = localStorage.getItem('auctionClient');
            if (!saved) {
                alert('ログインしてください。');
                location.href = 'index.html';
                return;
            }
            currentClient = JSON.parse(saved);
            const clientName = currentClient.client_name || currentClient.client_id;
            document.getElementById('client-name-display').textContent = `${clientName} 様のマイページ`;

            await fetchSettings();
            await fetchPurchases();
        }

        async function fetchSettings() {
            try {
                const res = await fetch('/api/settings');
                const data = await res.json();
                exchangeRate = Number(data.exchangeRate) || 150;
            } catch(e) {}
        }

        async function fetchPurchases() {
            const clientId = currentClient.client_id || currentClient.clientId;
            try {
                const res = await fetch(`/api/my-purchases?clientId=${encodeURIComponent(clientId)}`);
                const items = await res.json();
                renderPurchases(items);
            } catch(e) {
                document.getElementById('purchases-list').innerHTML = '<div style="text-align: center; color: var(--rose-red); padding: 20px;">データの取得に失敗しました。</div>';
            }
        }

        function renderPurchases(items) {
            const container = document.getElementById('purchases-list');
            container.innerHTML = '';

            if (!items || items.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; color: var(--text-muted); padding: 50px; background: #ffffff; border-radius: var(--radius-md); border: 1px solid #e2e8f0;">
                        <p style="font-size: 1.1em; font-weight: 600; margin-bottom: 8px;">落札した商品はまだありません</p>
                        <p style="font-size: 0.85em;">オークション会場で商品をご落札いただくと、ここに詳細と金額が表示されます。</p>
                    </div>
                `;
                document.getElementById('total-items-count').textContent = '0 items won';
                document.getElementById('total-amount-jpy').textContent = '¥0';
                document.getElementById('total-amount-usd').textContent = '($0)';
                return;
            }

            let totalJpy = 0;
            items.forEach(item => {
                totalJpy += item.current_bid || 0;
            });

            const totalUsd = Math.floor(totalJpy / exchangeRate);
            document.getElementById('total-items-count').textContent = `${items.length} items won`;
            document.getElementById('total-amount-jpy').textContent = '¥' + totalJpy.toLocaleString();
            // 修正箇所：テンプレートリテラルを正しく修正
            document.getElementById('total-amount-usd').textContent = `($${totalUsd.toLocaleString()})`;

            items.forEach(item => {
                let imageUrl = '';
                try {
                    const urls = JSON.parse(item.image_urls || '[]');
                    if (urls.length > 0) imageUrl = urls[0];
                } catch(e) {}

                const jpyPrice = item.current_bid || 0;
                const usdPrice = Math.floor(jpyPrice / exchangeRate);

                const card = document.createElement('div');
                card.className = 'purchase-card';
                card.innerHTML = `
                    <div class="purchase-img-box">
                        ${imageUrl ? `<img src="${imageUrl}" alt="${item.item_code}">` : '<span style="font-size:0.8em; color:#94a3b8;">No Image</span>'}
                    </div>
                    <div class="purchase-info">
                        <div style="font-size: 0.75em; font-weight: 700; color: var(--gold-primary); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 2px;">${item.brand || 'BRAND'}</div>
                        <h3>${item.item_code || '商品コードなし'}</h3>
                        <div class="purchase-meta">ステータス: <span style="color: var(--emerald-green); font-weight: 600;">落札成功 (Finished)</span></div>
                        ${item.item_memo ? `<div class="purchase-memo">${item.item_memo}</div>` : ''}
                    </div>
                    <div class="purchase-actions">
                        <div class="price-tag">¥${jpyPrice.toLocaleString()}</div>
                        <div class="price-usd">(Approx $${usdPrice.toLocaleString()})</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
