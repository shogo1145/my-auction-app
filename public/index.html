<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>プライベートオークション ログイン</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #1e293b; padding: 40px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.5); width: 350px; text-align: center; }
        h2 { margin-bottom: 25px; color: #f8fafc; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1em; }
        button:hover { background: #4338ca; }
        .error-msg { color: #f87171; margin-bottom: 15px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>プライベートオークション ログイン</h2>
        <div id="error-msg" class="error-msg"></div>
        <form id="login-form">
            <input type="text" id="client-id" placeholder="クライアントID (例: #C-501)" required>
            <input type="password" id="password" placeholder="パスワード" required>
            <button type="submit">ログイン</button>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const clientId = document.getElementById('client-id').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');

            errorDiv.textContent = '';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ clientId, password })
                });
                const data = await res.json();

                if (data.success) {
                    // ログイン成功情報を保存してオークション画面へ遷移
                    localStorage.setItem('auctionClient', JSON.stringify(data.client));
                    location.href = 'auction.html';
                } else {
                    errorDiv.textContent = data.message || 'ログインに失敗しました。';
                }
            } catch (err) {
                errorDiv.textContent = 'サーバー通信エラーが発生しました。';
            }
        });
    </script>
</body>
</html>
