<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Private Auction — Member Access</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .login-wrapper::before {
            content: '';
            position: absolute;
            width: 550px;
            height: 550px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
        }

        .login-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 48px 36px;
            text-align: center;
        }

        .brand-emblem {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), rgba(212, 175, 55, 0.05));
            border: 1px solid var(--gold-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--gold-glow);
        }

        .brand-emblem svg {
            width: 32px;
            height: 32px;
            fill: var(--gold-primary);
        }

        .login-title {
            font-size: 1.6em;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .login-subtitle {
            color: var(--text-secondary);
            font-size: 0.85em;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.8em;
            font-weight: 700;
            color: var(--gold-primary);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .error-msg {
            background: rgba(244, 63, 94, 0.08);
            border: 1px solid rgba(244, 63, 94, 0.3);
            color: var(--rose-red);
            padding: 10px;
            border-radius: var(--radius-sm);
            font-size: 0.85em;
            margin-bottom: 20px;
            display: none;
        }

        .success-msg {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: var(--gold-primary);
            padding: 10px;
            border-radius: var(--radius-sm);
            font-size: 0.85em;
            margin-bottom: 20px;
            display: none;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            font-size: 1em;
            margin-top: 10px;
        }

        .alt-btn {
            width: 100%;
            padding: 12px;
            font-size: 0.9em;
            margin-top: 10px;
            background: transparent;
            border: 1px solid var(--gold-primary);
            color: var(--gold-primary);
            border-radius: var(--radius-sm, 4px);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .alt-btn:hover {
            background: rgba(212, 175, 55, 0.1);
        }

        .help-link {
            margin-top: 16px;
            font-size: 0.8em;
            color: var(--text-secondary);
            cursor: pointer;
            text-decoration: underline;
            display: inline-block;
        }

        .help-link:hover {
            color: var(--gold-primary);
        }

        .footer-note {
            margin-top: 28px;
            font-size: 0.75em;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        /* モーダル共通スタイル */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-content {
            background: #1a1a1a;
            border: 1px solid var(--gold-primary);
            padding: 30px;
            border-radius: 8px;
            max-width: 420px;
            width: 100%;
            text-align: left;
            position: relative;
        }
        .modal-content h3 {
            color: var(--gold-primary);
            margin-bottom: 10px;
            font-size: 1.2em;
        }
        .modal-content p {
            font-size: 0.85em;
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .modal-error {
            background: rgba(244, 63, 94, 0.08);
            border: 1px solid rgba(244, 63, 94, 0.3);
            color: var(--rose-red);
            padding: 8px;
            border-radius: 4px;
            font-size: 0.8em;
            margin-bottom: 15px;
            display: none;
        }
        .close-modal {
            position: absolute;
            top: 15px; right: 15px;
            background: none; border: none;
            color: #fff; font-size: 1.2em; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card glass-panel animate-fade-in pulse-gold">
            <div class="brand-emblem">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
                </svg>
            </div>
            
            <h2 class="login-title font-serif gold-text">PRIVATE AUCTION</h2>
            <div class="login-subtitle">Exclusive Live Salon</div>

            <div id="error-msg" class="error-msg"></div>
            <div id="success-msg" class="success-msg"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="client-id">クライアントID</label>
                    <input type="text" id="client-id" placeholder="例: #C-501" required autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="password">パスワード</label>
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn-gold submit-btn">
                    <span>サロンに入室する</span>
                </button>

                <!-- 初回パスワード設定ボタン（モーダルを開くように変更） -->
                <button type="button" class="alt-btn" id="open-first-setup-modal">
                    <span>初回パスワードを設定する</span>
                </button>
            </form>

            <div style="text-align: center;">
                <span class="help-link" id="reset-password-link">パスワードを忘れた場合（合言葉で再設定）</span>
            </div>

            <div class="footer-note">
                PRIVILEGED & CONFIDENTIAL ACCESS ONLY
            </div>
        </div>
    </div>

    <!-- ★【新規追加】初回パスワード＆合言葉の同時設定用モーダル -->
    <div class="modal" id="first-setup-modal">
        <div class="modal-content">
            <button class="close-modal" id="close-first-modal-btn">&times;</button>
            <h3>初回パスワードと合言葉の設定</h3>
            <p>クライアントID、新しいパスワード、および万が一の際にパスワードを再設定するための「秘密の合言葉」を入力してください。</p>
            
            <div id="first-modal-error" class="modal-error"></div>

            <form id="first-setup-form">
                <div class="form-group">
                    <label for="setup-client-id">クライアントID</label>
                    <input type="text" id="setup-client-id" placeholder="例: #C-501" required>
                </div>
                <div class="form-group">
                    <label for="setup-password">新しいパスワード</label>
                    <input type="password" id="setup-password" placeholder="設定したいパスワード" required>
                </div>
                <div class="form-group">
                    <label for="setup-secret-word">秘密の合言葉</label>
                    <input type="text" id="setup-secret-word" placeholder="例: お気に入りのブランド名など" required>
                </div>
                <button type="submit" class="btn btn-gold" style="width: 100%; padding: 12px;">初期設定を完了して入室</button>
            </form>
        </div>
    </div>

    <!-- 合言葉によるパスワード再設定用モーダル -->
    <div class="modal" id="reset-modal">
        <div class="modal-content">
            <button class="close-modal" id="close-modal-btn">&times;</button>
            <h3>合言葉によるパスワード再設定</h3>
            <p>ご登録済みのクライアントIDと、事前に設定した「秘密の合言葉」を入力してください。一致すれば新しいパスワードに変更できます。</p>
            
            <div id="modal-error" class="modal-error"></div>

            <form id="reset-form">
                <div class="form-group">
                    <label for="reset-client-id">クライアントID</label>
                    <input type="text" id="reset-client-id" placeholder="例: #C-501" required>
                </div>
                <div class="form-group">
                    <label for="secret-word">秘密の合言葉</label>
                    <input type="text" id="secret-word" placeholder="例: お気に入りのブランド名など" required>
                </div>
                <div class="form-group">
                    <label for="new-password">新しいパスワード</label>
                    <input type="password" id="new-password" placeholder="新しいパスワードを入力" required>
                </div>
                <button type="submit" class="btn btn-gold" style="width: 100%; padding: 12px;">パスワードを再設定する</button>
            </form>
        </div>
    </div>

    <script>
        const errorDiv = document.getElementById('error-msg');
        const successDiv = document.getElementById('success-msg');

        function clearMessages() {
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            errorDiv.textContent = '';
            successDiv.textContent = '';
        }

        // 通常ログイン
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            clearMessages();
            const clientId = document.getElementById('client-id').value.trim();
            const password = document.getElementById('password').value.trim();

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ clientId, password })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('auctionClient', JSON.stringify(data.client));
                    location.href = 'auction.html';
                } else {
                    errorDiv.textContent = data.message || 'ログインに失敗しました。';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'サーバー通信エラーが発生しました。';
                errorDiv.style.display = 'block';
            }
        });

        // ★【新規追加】初回パスワード＆合言葉の同時設定フォーム送信
        const firstSetupModal = document.getElementById('first-setup-modal');
        
        document.getElementById('open-first-setup-modal').addEventListener('click', () => {
            document.getElementById('first-setup-form').reset();
            document.getElementById('first-modal-error').style.display = 'none';
            firstSetupModal.style.display = 'flex';
        });

        document.getElementById('close-first-modal-btn').addEventListener('click', () => {
            firstSetupModal.style.display = 'none';
        });

        document.getElementById('first-setup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const modalError = document.getElementById('first-modal-error');
            modalError.style.display = 'none';

            const clientId = document.getElementById('setup-client-id').value.trim();
            const password = document.getElementById('setup-password').value.trim();
            const secretWord = document.getElementById('setup-secret-word').value.trim();

            try {
                const res = await fetch('/api/set-password-with-secret', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ clientId, password, secretWord })
                });
                const data = await res.json();

                if (data.success) {
                    alert('パスワードと秘密の合言葉が正常に設定されました！');
                    localStorage.setItem('auctionClient', JSON.stringify(data.client));
                    location.href = 'auction.html';
                } else {
                    modalError.textContent = data.message || '設定に失敗しました。';
                    modalError.style.display = 'block';
                }
            } catch (err) {
                modalError.textContent = 'サーバー通信エラーが発生しました。';
                modalError.style.display = 'block';
            }
        });

        // 合言葉による再設定フォーム送信
        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const modalError = document.getElementById('modal-error');
            modalError.style.display = 'none';

            const clientId = document.getElementById('reset-client-id').value.trim();
            const secretWord = document.getElementById('secret-word').value.trim();
            const newPassword = document.getElementById('new-password').value.trim();

            try {
                const res = await fetch('/api/reset-password-by-secret', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ clientId, secretWord, newPassword })
                });
                const data = await res.json();

                if (data.success) {
                    alert('パスワードが正常に再設定されました！新しいパスワードでログインしてください。');
                    document.getElementById('reset-modal').style.display = 'none';
                    document.getElementById('client-id').value = clientId;
                    document.getElementById('password').value = '';
                } else {
                    modalError.textContent = data.message || '合言葉が一致しません。';
                    modalError.style.display = 'block';
                }
            } catch (err) {
                modalError.textContent = 'サーバー通信エラーが発生しました。';
                modalError.style.display = 'block';
            }
        });

        // モーダル開閉（再設定用）
        const resetModal = document.getElementById('reset-modal');
        document.getElementById('reset-password-link').addEventListener('click', () => {
            document.getElementById('reset-form').reset();
            document.getElementById('modal-error').style.display = 'none';
            resetModal.style.display = 'flex';
        });
        document.getElementById('close-modal-btn').addEventListener('click', () => {
            resetModal.style.display = 'none';
        });

        // モーダル外クリック時の閉じる処理
        window.addEventListener('click', (e) => {
            if (e.target === resetModal) {
                resetModal.style.display = 'none';
            }
            if (e.target === firstSetupModal) {
                firstSetupModal.style.display = 'none';
            }
        });
    </script>
</body>
</html>
