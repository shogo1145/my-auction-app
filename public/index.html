<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Private Auction — Member Access</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .login-wrapper::before {
            content: '';
            position: absolute;
            width: 550px;
            height: 550px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
        }

        .login-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 48px 36px;
            text-align: center;
        }

        .brand-emblem {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), rgba(212, 175, 55, 0.05));
            border: 1px solid var(--gold-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--gold-glow);
        }

        .brand-emblem svg {
            width: 32px;
            height: 32px;
            fill: var(--gold-primary);
        }

        .login-title {
            font-size: 1.6em;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .login-subtitle {
            color: var(--text-secondary);
            font-size: 0.85em;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.8em;
            font-weight: 700;
            color: var(--gold-primary);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .error-msg {
            background: rgba(244, 63, 94, 0.08);
            border: 1px solid rgba(244, 63, 94, 0.3);
            color: var(--rose-red);
            padding: 10px;
            border-radius: var(--radius-sm);
            font-size: 0.85em;
            margin-bottom: 20px;
            display: none;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            font-size: 1em;
            margin-top: 10px;
        }

        .footer-note {
            margin-top: 28px;
            font-size: 0.75em;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card glass-panel animate-fade-in pulse-gold">
            <div class="brand-emblem">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
                </svg>
            </div>
            
            <h2 class="login-title font-serif gold-text">PRIVATE AUCTION</h2>
            <div class="login-subtitle">Exclusive Live Salon</div>

            <div id="error-msg" class="error-msg"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="client-id">クライアントID</label>
                    <input type="text" id="client-id" placeholder="例: #C-501" required autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="password">パスワード</label>
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn-gold submit-btn">
                    <span>サロンに入室する</span>
                </button>
            </form>

            <div class="footer-note">
                PRIVILEGED & CONFIDENTIAL ACCESS ONLY
            </div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const clientId = document.getElementById('client-id').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');

            errorDiv.style.display = 'none';
            errorDiv.textContent = '';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ clientId, password })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('auctionClient', JSON.stringify(data.client));
                    location.href = 'auction.html';
                } else {
                    errorDiv.textContent = data.message || 'ログインに失敗しました。';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'サーバー通信エラーが発生しました。';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
