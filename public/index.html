<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Private Auction — Member Access</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .login-wrapper::before {
            content: '';
            position: absolute;
            width: 550px;
            height: 550px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
        }

        .login-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 48px 36px;
            text-align: center;
        }

        .brand-emblem {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), rgba(212, 175, 55, 0.05));
            border: 1px solid var(--gold-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--gold-glow);
        }

        .brand-emblem svg {
            width: 32px;
            height: 32px;
            fill: var(--gold-primary);
        }

        .login-title {
            font-size: 1.6em;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .login-subtitle {
            color: var(--text-secondary);
            font-size: 0.85em;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.8em;
            font-weight: 700;
            color: var(--gold-primary);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .error-msg {
            background: rgba(244, 63, 94, 0.08);
            border: 1px solid rgba(244, 63, 94, 0.3);
            color: var(--rose-red);
            padding: 10px;
            border-radius: var(--radius-sm);
            font-size: 0.85em;
            margin-bottom: 20px;
            display: none;
        }

        .success-msg {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: var(--gold-primary);
            padding: 10px;
            border-radius: var(--radius-sm);
            font-size: 0.85em;
            margin-bottom: 20px;
            display: none;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            font-size: 1em;
            margin-top: 10px;
        }

        .alt-btn {
            width: 100%;
            padding: 12px;
            font-size: 0.9em;
            margin-top: 10px;
            background: transparent;
            border: 1px solid var(--gold-primary);
            color: var(--gold-primary);
            border-radius: var(--radius-sm, 4px);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .alt-btn:hover {
            background: rgba(212, 175, 55, 0.1);
        }

        .help-link {
            margin-top: 16px;
            font-size: 0.8em;
            color: var(--text-secondary);
            cursor: pointer;
            text-decoration: underline;
            display: inline-block;
        }

        .help-link:hover {
            color: var(--gold-primary);
        }

        .footer-note {
            margin-top: 28px;
            font-size: 0.75em;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        /* モーダルスタイル（パスワード忘れ・救済用） */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-content {
            background: #1a1a1a;
            border: 1px solid var(--gold-primary);
            padding: 30px;
            border-radius: 8px;
            max-width: 400px;
            width: 100%;
            text-align: left;
            position: relative;
        }
        .modal-content h3 {
            color: var(--gold-primary);
            margin-bottom: 15px;
            font-size: 1.2em;
        }
        .modal-content p {
            font-size: 0.85em;
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .close-modal {
            position: absolute;
            top: 15px; right: 15px;
            background: none; border: none;
            color: #fff; font-size: 1.2em; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card glass-panel animate-fade-in pulse-gold">
            <div class="brand-emblem">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
                </svg>
            </div>
            
            <h2 class="login-title font-serif gold-text">PRIVATE AUCTION</h2>
            <div class="login-subtitle">Exclusive Live Salon</div>

            <div id="error-msg" class="error-msg"></div>
            <div id="success-msg" class="success-msg"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="client-id">クライアントID</label>
                    <input type="text" id="client-id" placeholder="例: #C-501" required autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="password">パスワード</label>
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn-gold submit-btn">
                    <span>サロンに入室する</span>
                </button>

                <!-- パスワードを新規設定・変更するボタン -->
                <button type="button" class="alt-btn" id="set-password-btn">
                    <span>パスワードを新規設定・変更する</span>
                </button>
            </form>

            <div style="text-align: center;">
                <span class="help-link" id="forgot-password-link">パスワードをお忘れですか？ / 救済処置について</span>
            </div>

            <div class="footer-note">
                PRIVILEGED & CONFIDENTIAL ACCESS ONLY
            </div>
        </div>
    </div>

    <!-- パスワード紛失・救済用モーダル -->
    <div class="modal" id="help-modal">
        <div class="modal-content">
            <button class="close-modal" id="close-modal-btn">&times;</button>
            <h3>パスワードの救済・再発行について</h3>
            <p>
                セキュリティ保護のため、すでに設定されたパスワードを勝手に他のユーザーが上書きすることはできません。<br><br>
                パスワードを紛失された場合や、新しくパスワードを再設定したい場合は、サロンの運営者（管理者）へ直接ご連絡いただき、本人確認のうえで一時的な初期化または再発行を行ってください。
            </p>
            <button type="button" class="btn btn-gold" style="width: 100%; padding: 10px;" id="ok-modal-btn">閉じる</button>
        </div>
    </div>

    <script>
        const errorDiv = document.getElementById('error-msg');
        const successDiv = document.getElementById('success-msg');

        function clearMessages() {
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            errorDiv.textContent = '';
            successDiv.textContent = '';
        }

        // 通常ログイン処理
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            clearMessages();
            const clientId = document.getElementById('client-id').value.trim();
            const password = document.getElementById('password').value.trim();

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ clientId, password })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('auctionClient', JSON.stringify(data.client));
                    location.href = 'auction.html';
                } else {
                    errorDiv.textContent = data.message || 'ログインに失敗しました。';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'サーバー通信エラーが発生しました。';
                errorDiv.style.display = 'block';
            }
        });

        // パスワード新規設定・変更ボタンの処理（セキュリティ強化版）
        document.getElementById('set-password-btn').addEventListener('click', async () => {
            clearMessages();
            const clientId = document.getElementById('client-id').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!clientId || !password) {
                errorDiv.textContent = 'クライアントIDと新しいパスワードを入力してください。';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const res = await fetch('/api/set-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ clientId, password })
                });
                const data = await res.json();

                if (data.success) {
                    successDiv.textContent = data.message || 'パスワードが設定されました！入室します...';
                    successDiv.style.display = 'block';
                    
                    localStorage.setItem('auctionClient', JSON.stringify(data.client));
                    setTimeout(() => {
                        location.href = 'auction.html';
                    }, 1000);
                } else {
                    errorDiv.textContent = data.message || 'パスワードの設定に失敗しました。';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'サーバー通信エラーが発生しました。';
                errorDiv.style.display = 'block';
            }
        });

        // モーダル操作
        const helpModal = document.getElementById('help-modal');
        document.getElementById('forgot-password-link').addEventListener('click', () => {
            helpModal.style.display = 'flex';
        });
        document.getElementById('close-modal-btn').addEventListener('click', () => {
            helpModal.style.display = 'none';
        });
        document.getElementById('ok-modal-btn').addEventListener('click', () => {
            helpModal.style.display = 'none';
        });
        window.addEventListener('click', (e) => {
            if (e.target === helpModal) {
                helpModal.style.display = 'none';
            }
        });
    </script>
</body>
</html>
