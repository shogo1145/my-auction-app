<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="page-title">VIP Private Auction — Live Hall</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* iPhoneなどのダブルタップズーム防止 */
        button, .btn, input, select, .currency-btn {
            touch-action: manipulation;
        }

        .auction-layout-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 20px 60px;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding: 14px 20px;
        }

        .client-badge {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .client-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--gold-gradient);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9em;
            box-shadow: 0 2px 8px rgba(184, 134, 11, 0.3);
        }

        .client-info-text {
            font-size: 0.85em;
            color: var(--text-secondary);
        }

        .client-info-id {
            color: var(--gold-primary);
            font-weight: 700;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .currency-toggle {
            display: flex;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 999px;
            border: 1px solid rgba(184, 134, 11, 0.2);
        }

        .currency-btn {
            padding: 6px 16px;
            border: none;
            border-radius: 999px;
            background: transparent;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.8em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .currency-btn.active {
            background: var(--gold-gradient);
            color: #ffffff;
            box-shadow: 0 2px 10px rgba(184, 134, 11, 0.3);
        }

        /* 2 Column Layout */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 24px;
        }

        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .auction-card {
            padding: 32px;
            text-align: center;
            position: relative;
        }

        .brand-header {
            margin-bottom: 6px;
        }

        .brand-name {
            font-size: 1.1em;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: var(--gold-primary);
            text-transform: uppercase;
        }

        .item-title {
            font-size: 1.5em;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .item-memo-box {
            background: rgba(184, 134, 11, 0.06);
            border-left: 4px solid var(--gold-primary);
            padding: 10px 16px;
            border-radius: 4px;
            font-size: 0.85em;
            color: var(--text-secondary);
            text-align: left;
            margin: 0 auto 20px;
            word-break: break-all;
        }

        .image-container {
            position: relative;
            width: 100%;
            height: 340px;
            background: #ffffff;
            border-radius: var(--radius-md);
            border: 1px solid rgba(0, 0, 0, 0.08);
            overflow: hidden;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.02);
        }

        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none;
            transition: opacity 0.3s ease;
        }

        .image-container img.active {
            display: block;
        }

        .thumbnails {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .thumbnails img {
            width: 56px;
            height: 56px;
            object-fit: cover;
            border-radius: var(--radius-sm);
            cursor: pointer;
            border: 2px solid transparent;
            opacity: 0.7;
            transition: all 0.2s ease;
            background: #ffffff;
        }

        .thumbnails img:hover {
            opacity: 1;
        }

        .thumbnails img.selected {
            border-color: var(--gold-primary);
            opacity: 1;
            box-shadow: 0 0 10px rgba(184, 134, 11, 0.3);
        }

        .auction-status-bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
            background: #f8fafc;
            padding: 16px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(184, 134, 11, 0.15);
        }

        .status-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .status-label {
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 4px;
            font-weight: 700;
        }

        .timer-val {
            font-family: var(--font-serif);
            font-size: 1.4em;
            font-weight: 700;
            color: var(--rose-red);
        }

        .price-val {
            font-family: var(--font-sans);
            font-size: 1.8em;
            font-weight: 800;
            color: var(--emerald-green);
        }

        .highest-bidder-box {
            font-size: 0.85em;
            color: var(--text-secondary);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 600;
        }

        /* 落札成功時の祝福UI */
        .win-banner {
            background: linear-gradient(135deg, #d4af37, #aa7c11);
            color: #ffffff;
            padding: 16px;
            border-radius: var(--radius-sm);
            text-align: center;
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 24px;
            box-shadow: 0 4px 15px rgba(184, 134, 11, 0.4);
            animation: pulse 1.5s infinite;
            display: none;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .bid-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .bid-btn {
            padding: 16px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-md);
            font-size: 1.1em;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        /* サブツリー（メニューモーダル）の拡張スタイル */
        .submenu-section {
            margin-bottom: 20px;
            text-align: left;
        }

        .submenu-section label {
            display: block;
            font-size: 0.85em;
            font-weight: 700;
            color: var(--gold-primary);
            margin-bottom: 8px;
        }

        .submenu-section select {
            width: 100%;
            padding: 10px;
            background: #ffffff;
            border: 1px solid rgba(184, 134, 11, 0.3);
            border-radius: var(--radius-sm);
            font-size: 0.95em;
        }

        .purchases-preview-list {
            max-height: 180px;
            overflow-y: auto;
            background: #f8fafc;
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: var(--radius-sm);
            padding: 10px;
        }

        .purchase-mini-item {
            padding: 8px 0;
            border-bottom: 1px solid #edf2f7;
            font-size: 0.85em;
        }
    </style>
</head>
<body>
    <div class="auction-layout-container">
        <!-- Top Bar -->
        <div class="header-bar glass-panel">
            <div class="client-badge">
                <div class="client-avatar" id="client-avatar">VIP</div>
                <div class="client-info-text">
                    <span id="txt-welcome">Welcome</span>, <span class="client-info-id" id="client-id-display">--</span>
                    <div id="client-name-display" style="font-size:0.8em; color:var(--text-muted);">---</div>
                </div>
            </div>

            <div class="header-actions">
                <button onclick="openSubMenuModal()" class="btn btn-gold" style="padding:6px 14px; font-size:0.8em;">
                    <span id="txt-menu-btn">⚙️ メニュー / 設定</span>
                </button>

                <div class="currency-toggle">
                    <button id="btn-usd" class="currency-btn active" onclick="setCurrency('USD')">USD ($)</button>
                    <button id="btn-jpy" class="currency-btn" onclick="setCurrency('JPY')">JPY (¥)</button>
                </div>
            </div>
        </div>

        <!-- 2 Column Main Grid -->
        <div class="main-grid">
            <!-- Left: Main Auction Card -->
            <div class="auction-card glass-panel animate-fade-in">
                <!-- 落札成功時の祝福UI -->
                <div class="win-banner" id="win-banner">
                    🎉 <span id="txt-win-congrats">あなたが落札できました！</span> 🎉
                </div>

                <div class="brand-header">
                    <span class="brand-name" id="item-brand">---</span>
                </div>
                
                <h2 class="item-title font-serif" id="item-code">商品コード: 読み込み中...</h2>

                <div class="item-memo-box" id="item-memo-box" style="display: none;">
                    <strong style="color:var(--gold-primary);">NOTE:</strong> <span id="item-memo-text"></span>
                </div>

                <!-- Image View -->
                <div class="image-container" id="main-image-container">
                    <p style="color: var(--text-muted);" id="txt-loading-img">画像読み込み中...</p>
                </div>
                <div class="thumbnails" id="thumbnails-container"></div>

                <!-- Realtime Auction Status -->
                <div class="auction-status-bar">
                    <div class="status-box">
                        <span class="status-label" id="txt-time-label">TIME REMAINING</span>
                        <span class="timer-val" id="timer-display">--:--</span>
                    </div>
                    <div class="status-box">
                        <span class="status-label" id="txt-current-price-label">CURRENT BID</span>
                        <span class="price-val" id="price-display">--</span>
                    </div>
                </div>

                <div class="highest-bidder-box">
                    <span id="txt-highest-bidder-label">HIGHEST BIDDER:</span>
                    <span class="badge badge-gold" id="highest-bidder">---</span>
                </div>

                <!-- Bid Action Buttons -->
                <div class="bid-buttons">
                    <button id="bid-btn-1" class="btn btn-gold bid-btn" onclick="placeBid(step1)">
                        <span>+ $10</span>
                    </button>
                    <button id="bid-btn-2" class="btn btn-gold bid-btn" onclick="placeBid(step2)">
                        <span>+ $100</span>
                    </button>
                    <button id="bid-btn-3" class="btn btn-gold bid-btn" onclick="placeBid(step3)">
                        <span>+ $1000</span>
                    </button>
                </div>
            </div>

            <!-- Right: Realtime Bid Feed -->
            <div class="bid-feed-panel glass-panel animate-fade-in">
                <div class="bid-feed-header">
                    <h3 class="font-serif gold-text" style="font-size:1em;" id="txt-feed-title">LIVE BID FEED</h3>
                    <span class="badge badge-emerald" id="txt-realtime-badge">REAL-TIME</span>
                </div>
                
                <div class="bid-feed-list" id="bid-feed-list">
                    <p style="color:var(--text-muted); font-size:0.85em; text-align:center; padding-top:20px;" id="txt-loading-bids">入札履歴を読み込み中...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- サブツリー Modal (メニュー / 設定 / My Purchases / 多言語設定) -->
    <div class="modal-overlay" id="submenu-modal">
        <div class="modal-content glass-panel" style="max-width: 460px;">
            <button class="modal-close-btn" onclick="closeSubMenuModal()">&times;</button>
            <h3 class="font-serif gold-text" style="font-size:1.3em; margin-bottom:16px;" id="txt-modal-heading">📋 メニュー ＆ 設定</h3>

            <!-- 多言語設定 サブツリー要素 -->
            <div class="submenu-section">
                <label id="txt-lang-heading">言語設定 (Language / Wika)</label>
                <select id="lang-select" onchange="changeLanguage(this.value)">
                    <option value="ja">日本語 (Japanese)</option>
                    <option value="en">English (英語)</option>
                    <option value="tl">Tagalog (タガログ語)</option>
                </select>
            </div>

            <!-- My Purchases サブツリー要素 -->
            <div class="submenu-section">
                <label id="txt-purchases-heading">🏆 My Purchases (落札履歴)</label>
                <div class="purchases-preview-list" id="purchases-preview-list">
                    <p style="color:var(--text-muted); font-size:0.85em; text-align:center; padding:15px 0;">読み込み中...</p>
                </div>
            </div>

            <div style="text-align: right; margin-top: 20px;">
                <button onclick="closeSubMenuModal()" class="btn btn-gold" style="padding: 8px 20px; font-size: 0.9em;">閉じる</button>
            </div>
        </div>
    </div>

    <script>
        let currentClient = null;
        let currentCurrency = 'USD';
        let exchangeRate = 150;
        let currentItem = null;
        let remainingSeconds = 180;
        let timerInterval = null;
        let currentLang = localStorage.getItem('auctionLang') || 'ja';

        const step1 = 10;
        const step2 = 100;
        const step3 = 1000;

        // 多言語辞書
        const dict = {
            ja: {
                welcome: "Welcome",
                menuBtn: "⚙️ メニュー / 設定",
                winCongrats: "あなたが落札できました！",
                loadingImg: "画像読み込み中...",
                timeLabel: "TIME REMAINING",
                currentPriceLabel: "CURRENT BID",
                highestBidderLabel: "HIGHEST BIDDER:",
                feedTitle: "LIVE BID FEED",
                realtimeBadge: "REAL-TIME",
                loadingBids: "入札履歴を読み込み中...",
                modalHeading: "📋 メニュー ＆ 設定",
                langHeading: "言語設定 (Language)",
                purchasesHeading: "🏆 My Purchases (落札履歴)"
            },
            en: {
                welcome: "Welcome",
                menuBtn: "⚙️ Menu / Settings",
                winCongrats: "You won this item!",
                loadingImg: "Loading image...",
                timeLabel: "TIME REMAINING",
                currentPriceLabel: "CURRENT BID",
                highestBidderLabel: "HIGHEST BIDDER:",
                feedTitle: "LIVE BID FEED",
                realtimeBadge: "REAL-TIME",
                loadingBids: "Loading bid history...",
                modalHeading: "📋 Menu & Settings",
                langHeading: "Language Settings",
                purchasesHeading: "🏆 My Purchases"
            },
            tl: {
                welcome: "Mabuhay",
                menuBtn: "⚙️ Menu / Settings",
                winCongrats: "Ikaw ang nanalo sa item na ito!",
                loadingImg: "Naglo-load ng imahe...",
                timeLabel: "NATITIRANG ORAS",
                currentPriceLabel: "KASALUKUYANG BID",
                highestBidderLabel: "PINAKAMATAAS NA BIDDER:",
                feedTitle: "LIVE BID FEED",
                realtimeBadge: "REAL-TIME",
                loadingBids: "Naglo-load ng kasaysayan ng bid...",
                modalHeading: "📋 Menu at Settings",
                langHeading: "Wika (Language)",
                purchasesHeading: "🏆 Aking Mga Binili (My Purchases)"
            }
        };

        function updateTexts() {
            const t = dict[currentLang] || dict.ja;
            document.getElementById('txt-welcome').textContent = t.welcome;
            document.getElementById('txt-menu-btn').textContent = t.menuBtn;
            document.getElementById('txt-win-congrats').textContent = t.winCongrats;
            document.getElementById('txt-time-label').textContent = t.timeLabel;
            document.getElementById('txt-current-price-label').textContent = t.currentPriceLabel;
            document.getElementById('txt-highest-bidder-label').textContent = t.highestBidderLabel;
            document.getElementById('txt-feed-title').textContent = t.feedTitle;
            document.getElementById('txt-realtime-badge').textContent = t.realtimeBadge;
            document.getElementById('txt-modal-heading').textContent = t.modalHeading;
            document.getElementById('txt-lang-heading').textContent = t.langHeading;
            document.getElementById('txt-purchases-heading').textContent = t.purchasesHeading;
            document.getElementById('lang-select').value = currentLang;
        }

        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('auctionLang', lang);
            updateTexts();
        }

        const savedClient = localStorage.getItem('auctionClient');
        if (!savedClient) {
            alert('ログインしてください。');
            location.href = 'index.html';
        } else {
            currentClient = JSON.parse(savedClient);
            document.getElementById('client-id-display').textContent = currentClient.client_id;
            document.getElementById('client-name-display').textContent = currentClient.client_name;
            if (currentClient.client_id) {
                document.getElementById('client-avatar').textContent = currentClient.client_id.replace('#', '').slice(0, 3);
            }
        }

        async function fetchSettings() {
            try {
                const res = await fetch('/api/settings');
                const data = await res.json();
                exchangeRate = Number(data.exchangeRate) || 150;
                updateButtonLabels();
                updatePriceDisplay();
            } catch(e) {}
        }

        function setCurrency(curr) {
            currentCurrency = curr;
            document.getElementById('btn-jpy').classList.toggle('active', curr === 'JPY');
            document.getElementById('btn-usd').classList.toggle('active', curr === 'USD');
            updatePriceDisplay();
            updateButtonLabels();
            pollActiveBids();
        }

        function updateButtonLabels() {
            const btn1 = document.getElementById('bid-btn-1');
            const btn2 = document.getElementById('bid-btn-2');
            const btn3 = document.getElementById('bid-btn-3');

            if (currentCurrency === 'USD') {
                btn1.innerHTML = `<span>+ $${step1}</span>`;
                btn2.innerHTML = `<span>+ $${step2}</span>`;
                btn3.innerHTML = `<span>+ $${step3}</span>`;
            } else {
                const yen1 = step1 * exchangeRate;
                const yen2 = step2 * exchangeRate;
                const yen3 = step3 * exchangeRate;
                btn1.innerHTML = `<span>+ ¥${yen1.toLocaleString()}</span>`;
                btn2.innerHTML = `<span>+ ¥${yen2.toLocaleString()}</span>`;
                btn3.innerHTML = `<span>+ ¥${yen3.toLocaleString()}</span>`;
            }
        }

        let lastItemId = null;

        async function pollActiveItem() {
            try {
                await fetchSettings();
                const res = await fetch('/api/items/active');
                const item = await res.json();
                
                const winBanner = document.getElementById('win-banner');

                if (item && item.id) {
                    if (lastItemId !== item.id) {
                        lastItemId = item.id;
                        remainingSeconds = item.timer_seconds || 180;
                        knownBidIds.clear();
                        document.getElementById('bid-feed-list').innerHTML = `<p style="color:var(--text-muted); font-size:0.85em; text-align:center; padding-top:20px;">${dict[currentLang].loadingBids}</p>`;
                        startTimer();
                    }

                    document.getElementById('item-brand').textContent = item.brand || 'EXCLUSIVE ITEM';
                    document.getElementById('item-code').textContent = `${item.item_code}`;
                    
                    const memoBox = document.getElementById('item-memo-box');
                    if (item.item_memo && item.item_memo.trim() !== '') {
                        document.getElementById('item-memo-text').textContent = item.item_memo;
                        memoBox.style.display = 'block';
                    } else {
                        memoBox.style.display = 'none';
                    }

                    currentItem = item;
                    updatePriceDisplay();
                    document.getElementById('highest-bidder').textContent = item.highest_bidder || 'NONE';

                    updateImages(item.image_urls);

                    const clientIdToCheck = (typeof currentClient === 'string') ? currentClient : (currentClient.client_id || currentClient.clientId || currentClient.id);
                    if (item.status === 'finished' && item.highest_bidder === clientIdToCheck) {
                        winBanner.style.display = 'block';
                    } else {
                        winBanner.style.display = 'none';
                    }
                } else {
                    document.getElementById('item-brand').textContent = 'EXHIBITION PAUSED';
                    document.getElementById('item-code').textContent = '現在出品中の商品はありません';
                    document.getElementById('item-memo-box').style.display = 'none';
                    document.getElementById('price-display').textContent = '---';
                    document.getElementById('highest-bidder').textContent = '---';
                    document.getElementById('main-image-container').innerHTML = '<p style="color: var(--text-muted);">次回出品をお待ちください</p>';
                    document.getElementById('thumbnails-container').innerHTML = '';
                    document.getElementById('timer-display').textContent = '--:--';
                    winBanner.style.display = 'none';
                }
            } catch(e) {}
        }

        let knownBidIds = new Set();

        async function pollActiveBids() {
            try {
                const res = await fetch('/api/bids/active');
                const bids = await res.json();
                const listEl = document.getElementById('bid-feed-list');

                if (!bids || bids.length === 0) {
                    listEl.innerHTML = `<p style="color:var(--text-muted); font-size:0.85em; text-align:center; padding-top:20px;">${dict[currentLang].loadingBids}</p>`;
                    return;
                }

                let html = '';
                bids.forEach(b => {
                    const isNew = !knownBidIds.has(b.id);
                    knownBidIds.add(b.id);

                    let priceText = '';
                    if (currentCurrency === 'USD') {
                        const usdVal = (b.amount / exchangeRate).toFixed(2);
                        priceText = `$${Number(usdVal).toLocaleString('en-US', {minimumFractionDigits: 2})}`;
                    } else {
                        priceText = `¥${Number(b.amount).toLocaleString()}`;
                    }

                    const dateObj = new Date(b.created_at);
                    const timeStr = isNaN(dateObj.getTime()) ? '' : dateObj.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

                    html += `
                        <div class="bid-feed-item ${isNew ? 'new-bid' : ''}">
                            <div>
                                <div class="bid-user-id">${b.client_id}</div>
                                <div class="bid-time">${timeStr}</div>
                            </div>
                            <div class="bid-amount-val">${priceText}</div>
                        </div>
                    `;
                });

                listEl.innerHTML = html;
            } catch(e) {}
        }

        function updateImages(urlsJson) {
            try {
                const urls = JSON.parse(urlsJson || '[]');
                const mainContainer = document.getElementById('main-image-container');
                const thumbContainer = document.getElementById('thumbnails-container');
                
                if (urls.length === 0) {
                    mainContainer.innerHTML = '<p style="color: var(--text-muted);">NO IMAGE AVAILABLE</p>';
                    thumbContainer.innerHTML = '';
                    return;
                }

                if (mainContainer.dataset.loadedIds !== urls.join(',')) {
                    mainContainer.dataset.loadedIds = urls.join(',');
                    mainContainer.innerHTML = '';
                    thumbContainer.innerHTML = '';

                    urls.forEach((url, index) => {
                        const img = document.createElement('img');
                        img.src = url;
                        if (index === 0) img.classList.add('active');
                        img.id = `main-img-${index}`;
                        mainContainer.appendChild(img);

                        const thumb = document.createElement('img');
                        thumb.src = url;
                        if (index === 0) thumb.classList.add('selected');
                        thumb.onclick = () => {
                            document.querySelectorAll('.image-container img').forEach(i => i.classList.remove('active'));
                            document.querySelectorAll('.thumbnails img').forEach(t => t.classList.remove('selected'));
                            img.classList.add('active');
                            thumb.classList.add('selected');
                        };
                        thumbContainer.appendChild(thumb);
                    });
                }
            } catch(e) {}
        }

        function updatePriceDisplay() {
            if (!currentItem) return;
            const currentBidYen = currentItem.current_bid || 0;
            const displayEl = document.getElementById('price-display');

            if (currentCurrency === 'USD') {
                const usdVal = (currentBidYen / exchangeRate).toFixed(2);
                displayEl.textContent = `$${Number(usdVal).toLocaleString('en-US', {minimumFractionDigits: 2})}`;
            } else {
                displayEl.textContent = `¥${currentBidYen.toLocaleString()}`;
            }
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(async () => {
                const timerEl = document.getElementById('timer-display');
                if (remainingSeconds > 0) {
                    remainingSeconds--;
                    const mins = Math.floor(remainingSeconds / 60);
                    const secs = remainingSeconds % 60;
                    timerEl.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                    
                    // タイマーが0秒になった瞬間にサーバーへ終了＆次への移行をリクエスト
                    if (remainingSeconds === 0 && currentItem) {
                        try {
                            await fetch('/api/items/check-and-next', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ itemId: currentItem.id })
                            });
                        } catch(e) {}
                    }
                } else {
                    timerEl.textContent = 'CLOSED';
                }
            }, 1000);
        }

        async function placeBid(amountUSD) {
            if (!currentItem) return;

            const clientIdToSend = (typeof currentClient === 'string') 
                ? currentClient 
                : (currentClient.client_id || currentClient.clientId || currentClient.id);

            if (!clientIdToSend) {
                alert('クライアント情報が確認できません。再ログインしてください。');
                return;
            }

            const amountYen = Math.round(amountUSD * exchangeRate);

            try {
                const res = await fetch('/api/bid', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        itemId: currentItem.id,
                        amount: amountYen,
                        clientId: clientIdToSend
                    })
                });
                const data = await res.json();
                if (data.success) {
                    currentItem.current_bid = data.currentBid;
                    currentItem.highest_bidder = data.highestBidder;
                    updatePriceDisplay();
                    document.getElementById('highest-bidder').textContent = data.highestBidder;
                    pollActiveBids();
                } else {
                    alert(data.message || '入札に失敗しました。');
                }
            } catch (err) {
                alert('通信エラーが発生しました。');
            }
        }

        function openSubMenuModal() {
            document.getElementById('submenu-modal').classList.add('active');
            loadMyPurchases();
        }

        function closeSubMenuModal() {
            document.getElementById('submenu-modal').classList.remove('active');
        }

        async function loadMyPurchases() {
            if (!currentClient) return;
            try {
                const clientIdToSend = (typeof currentClient === 'string') ? currentClient : (currentClient.client_id || currentClient.clientId || currentClient.id);
                const res = await fetch(`/api/my-purchases?clientId=${encodeURIComponent(clientIdToSend)}`);
                const items = await res.json();
                const listEl = document.getElementById('purchases-preview-list');

                if (!items || items.length === 0) {
                    listEl.innerHTML = '<p style="color:var(--text-muted); font-size:0.85em; text-align:center; padding:15px 0;">まだ落札した商品はありません。</p>';
                    return;
                }

                let html = '';
                items.forEach(item => {
                    const usdVal = (item.current_bid / exchangeRate).toFixed(2);
                    html += `
                        <div class="purchase-mini-item">
                            <div style="font-weight:700; color:var(--gold-primary);">${item.brand || ''} (${item.item_code})</div>
                            <div>落札価格: $${Number(usdVal).toLocaleString('en-US', {minimumFractionDigits: 2})} (¥${Number(item.current_bid).toLocaleString()})</div>
                        </div>
                    `;
                });
                listEl.innerHTML = html;
            } catch(e) {}
        }

        async function init() {
            updateTexts();
            await fetchSettings();
            pollActiveItem();
            pollActiveBids();
            setInterval(pollActiveItem, 2000);
            setInterval(pollActiveBids, 2000);
        }

        init();
    </script>
</body>
</html>
