<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Private Auction — Live Hall</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auction-layout-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 20px 60px;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding: 14px 20px;
        }

        .client-badge {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .client-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--gold-gradient);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9em;
            box-shadow: 0 2px 8px rgba(184, 134, 11, 0.3);
        }

        .client-info-text {
            font-size: 0.85em;
            color: var(--text-secondary);
        }

        .client-info-id {
            color: var(--gold-primary);
            font-weight: 700;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .currency-toggle {
            display: flex;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 999px;
            border: 1px solid rgba(184, 134, 11, 0.2);
        }

        .currency-btn {
            padding: 6px 16px;
            border: none;
            border-radius: 999px;
            background: transparent;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.8em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .currency-btn.active {
            background: var(--gold-gradient);
            color: #ffffff;
            box-shadow: 0 2px 10px rgba(184, 134, 11, 0.3);
        }

        /* 2 Column Layout */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 24px;
        }

        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .auction-card {
            padding: 32px;
            text-align: center;
            position: relative;
        }

        .brand-header {
            margin-bottom: 6px;
        }

        .brand-name {
            font-size: 1.1em;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: var(--gold-primary);
            text-transform: uppercase;
        }

        .item-title {
            font-size: 1.5em;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .item-memo-box {
            background: rgba(184, 134, 11, 0.06);
            border-left: 4px solid var(--gold-primary);
            padding: 10px 16px;
            border-radius: 4px;
            font-size: 0.85em;
            color: var(--text-secondary);
            text-align: left;
            margin: 0 auto 20px;
            word-break: break-all;
        }

        .image-container {
            position: relative;
            width: 100%;
            height: 340px;
            background: #ffffff;
            border-radius: var(--radius-md);
            border: 1px solid rgba(0, 0, 0, 0.08);
            overflow: hidden;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.02);
        }

        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none;
            transition: opacity 0.3s ease;
        }

        .image-container img.active {
            display: block;
        }

        .thumbnails {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .thumbnails img {
            width: 56px;
            height: 56px;
            object-fit: cover;
            border-radius: var(--radius-sm);
            cursor: pointer;
            border: 2px solid transparent;
            opacity: 0.7;
            transition: all 0.2s ease;
            background: #ffffff;
        }

        .thumbnails img:hover {
            opacity: 1;
        }

        .thumbnails img.selected {
            border-color: var(--gold-primary);
            opacity: 1;
            box-shadow: 0 0 10px rgba(184, 134, 11, 0.3);
        }

        .auction-status-bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
            background: #f8fafc;
            padding: 16px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(184, 134, 11, 0.15);
        }

        .status-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .status-label {
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 4px;
            font-weight: 700;
        }

        .timer-val {
            font-family: var(--font-serif);
            font-size: 1.4em;
            font-weight: 700;
            color: var(--rose-red);
        }

        .price-val {
            font-family: var(--font-sans);
            font-size: 1.8em;
            font-weight: 800;
            color: var(--emerald-green);
        }

        .highest-bidder-box {
            font-size: 0.85em;
            color: var(--text-secondary);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 600;
        }

        .bid-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .bid-btn {
            padding: 16px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-md);
            font-size: 1.1em;
            font-weight: 700;
            letter-spacing: 0.02em;
        }
    </style>
</head>
<body>
    <div class="auction-layout-container">
        <!-- Top Bar -->
        <div class="header-bar glass-panel">
            <div class="client-badge">
                <div class="client-avatar" id="client-avatar">VIP</div>
                <div class="client-info-text">
                    Welcome, <span class="client-info-id" id="client-id-display">--</span>
                    <div id="client-name-display" style="font-size:0.8em; color:var(--text-muted);">---</div>
                </div>
            </div>

            <div class="header-actions">
                <button onclick="openPurchasesModal()" class="btn btn-gold" style="padding:6px 14px; font-size:0.8em;">
                    <span>🏆 My Purchases</span>
                </button>

                <div class="currency-toggle">
                    <button id="btn-usd" class="currency-btn active" onclick="setCurrency('USD')">USD ($)</button>
                    <button id="btn-jpy" class="currency-btn" onclick="setCurrency('JPY')">JPY (¥)</button>
                </div>
            </div>
        </div>

        <!-- 2 Column Main Grid -->
        <div class="main-grid">
            <!-- Left: Main Auction Card -->
            <div class="auction-card glass-panel animate-fade-in">
                <div class="brand-header">
                    <span class="brand-name" id="item-brand">---</span>
                </div>
                
                <h2 class="item-title font-serif" id="item-code">商品コード: 読み込み中...</h2>

                <div class="item-memo-box" id="item-memo-box" style="display: none;">
                    <strong style="color:var(--gold-primary);">NOTE:</strong> <span id="item-memo-text"></span>
                </div>

                <!-- Image View -->
                <div class="image-container" id="main-image-container">
                    <p style="color: var(--text-muted);">画像読み込み中...</p>
                </div>
                <div class="thumbnails" id="thumbnails-container"></div>

                <!-- Realtime Auction Status -->
                <div class="auction-status-bar">
                    <div class="status-box">
                        <span class="status-label">TIME REMAINING</span>
                        <span class="timer-val" id="timer-display">--:--</span>
                    </div>
                    <div class="status-box">
                        <span class="status-label">CURRENT BID</span>
                        <span class="price-val" id="price-display">--</span>
                    </div>
                </div>

                <div class="highest-bidder-box">
                    <span>HIGHEST BIDDER:</span>
                    <span class="badge badge-gold" id="highest-bidder">---</span>
                </div>

                <!-- Bid Action Buttons -->
                <div class="bid-buttons">
                    <button id="bid-btn-1" class="btn btn-gold bid-btn" onclick="placeBid(step1)">
                        <span>+ $10</span>
                    </button>
                    <button id="bid-btn-2" class="btn btn-gold bid-btn" onclick="placeBid(step2)">
                        <span>+ $100</span>
                    </button>
                    <button id="bid-btn-3" class="btn btn-gold bid-btn" onclick="placeBid(step3)">
                        <span>+ $1000</span>
                    </button>
                </div>
            </div>

            <!-- Right: Realtime Bid Feed -->
            <div class="bid-feed-panel glass-panel animate-fade-in">
                <div class="bid-feed-header">
                    <h3 class="font-serif gold-text" style="font-size:1em;">LIVE BID FEED</h3>
                    <span class="badge badge-emerald">REAL-TIME</span>
                </div>
                
                <div class="bid-feed-list" id="bid-feed-list">
                    <p style="color:var(--text-muted); font-size:0.85em; text-align:center; padding-top:20px;">入札履歴を読み込み中...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- My Purchases Modal -->
    <div class="modal-overlay" id="purchases-modal">
        <div class="modal-content glass-panel">
            <button class="modal-close-btn" onclick="closePurchasesModal()">&times;</button>
            <h3 class="font-serif gold-text" style="font-size:1.4em; margin-bottom:4px;">🏆 My Purchases</h3>
            <p style="font-size:0.8em; color:var(--text-muted);">あなたがこれまでに落札した商品の一覧です</p>

            <div class="purchases-grid" id="purchases-grid">
                <p style="color:var(--text-muted); font-size:0.85em; grid-column: 1 / -1; text-align:center; padding:30px 0;">読み込み中...</p>
            </div>
        </div>
    </div>

    <script>
        let currentClient = null;
        let currentCurrency = 'USD';
        let exchangeRate = 150;
        let currentItem = null;
        let remainingSeconds = 180;
        let timerInterval = null;

        const step1 = 10;
        const step2 = 100;
        const step3 = 1000;

        const savedClient = localStorage.getItem('auctionClient');
        if (!savedClient) {
            alert('ログインしてください。');
            location.href = 'index.html';
        } else {
            currentClient = JSON.parse(savedClient);
            document.getElementById('client-id-display').textContent = currentClient.client_id;
            document.getElementById('client-name-display').textContent = currentClient.client_name;
            if (currentClient.client_id) {
                document.getElementById('client-avatar').textContent = currentClient.client_id.replace('#', '').slice(0, 3);
            }
        }

        async function fetchSettings() {
            try {
                const res = await fetch('/api/settings');
                const data = await res.json();
                exchangeRate = Number(data.exchangeRate) || 150;
                updateButtonLabels();
                updatePriceDisplay();
            } catch(e) {}
        }

        function setCurrency(curr) {
            currentCurrency = curr;
            document.getElementById('btn-jpy').classList.toggle('active', curr === 'JPY');
            document.getElementById('btn-usd').classList.toggle('active', curr === 'USD');
            updatePriceDisplay();
            updateButtonLabels();
            pollActiveBids();
        }

        function updateButtonLabels() {
            const btn1 = document.getElementById('bid-btn-1');
            const btn2 = document.getElementById('bid-btn-2');
            const btn3 = document.getElementById('bid-btn-3');

            if (currentCurrency === 'USD') {
                btn1.innerHTML = `<span>+ $${step1}</span>`;
                btn2.innerHTML = `<span>+ $${step2}</span>`;
                btn3.innerHTML = `<span>+ $${step3}</span>`;
            } else {
                const yen1 = step1 * exchangeRate;
                const yen2 = step2 * exchangeRate;
                const yen3 = step3 * exchangeRate;
                btn1.innerHTML = `<span>+ ¥${yen1.toLocaleString()}</span>`;
                btn2.innerHTML = `<span>+ ¥${yen2.toLocaleString()}</span>`;
                btn3.innerHTML = `<span>+ ¥${yen3.toLocaleString()}</span>`;
            }
        }

        let lastItemId = null;

        async function pollActiveItem() {
            try {
                await fetchSettings();
                const res = await fetch('/api/items/active');
                const item = await res.json();
                
                if (item && item.id) {
                    document.getElementById('item-brand').textContent = item.brand || 'EXCLUSIVE ITEM';
                    document.getElementById('item-code').textContent = `${item.item_code}`;
                    
                    const memoBox = document.getElementById('item-memo-box');
                    if (item.item_memo && item.item_memo.trim() !== '') {
                        document.getElementById('item-memo-text').textContent = item.item_memo;
                        memoBox.style.display = 'block';
                    } else {
                        memoBox.style.display = 'none';
                    }
                    
                    if (lastItemId !== item.id) {
                        lastItemId = item.id;
                        remainingSeconds = item.timer_seconds || 180;
                        startTimer();
                    }

                    currentItem = item;
                    updatePriceDisplay();
                    document.getElementById('highest-bidder').textContent = item.highest_bidder || 'NONE';

                    updateImages(item.image_urls);
                } else {
                    document.getElementById('item-brand').textContent = 'EXHIBITION PAUSED';
                    document.getElementById('item-code').textContent = '現在出品中の商品はありません';
                    document.getElementById('item-memo-box').style.display = 'none';
                    document.getElementById('price-display').textContent = '---';
                    document.getElementById('highest-bidder').textContent = '---';
                    document.getElementById('main-image-container').innerHTML = '<p style="color: var(--text-muted);">次回出品をお待ちください</p>';
                    document.getElementById('thumbnails-container').innerHTML = '';
                    document.getElementById('timer-display').textContent = '--:--';
                }
            } catch(e) {}
        }

        let knownBidIds = new Set();

        async function pollActiveBids() {
            try {
                const res = await fetch('/api/bids/active');
                const bids = await res.json();
                const listEl = document.getElementById('bid-feed-list');

                if (!bids || bids.length === 0) {
                    listEl.innerHTML = '<p style="color:var(--text-muted); font-size:0.85em; text-align:center; padding-top:20px;">まだ入札はありません</p>';
                    return;
                }

                let html = '';
                bids.forEach(b => {
                    const isNew = !knownBidIds.has(b.id);
                    knownBidIds.add(b.id);

                    let priceText = '';
                    if (currentCurrency === 'USD') {
                        const usdVal = (b.amount / exchangeRate).toFixed(2);
                        priceText = `$${Number(usdVal).toLocaleString('en-US', {minimumFractionDigits: 2})}`;
                    } else {
                        priceText = `¥${Number(b.amount).toLocaleString()}`;
                    }

                    const dateObj = new Date(b.created_at);
                    const timeStr = isNaN(dateObj.getTime()) ? '' : dateObj.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

                    html += `
                        <div class="bid-feed-item ${isNew ? 'new-bid' : ''}">
                            <div>
                                <div class="bid-user-id">${b.client_id}</div>
                                <div class="bid-time">${timeStr}</div>
                            </div>
                            <div class="bid-amount-val">${priceText}</div>
                        </div>
                    `;
                });

                listEl.innerHTML = html;
            } catch(e) {}
        }

        function updateImages(urlsJson) {
            try {
                const urls = JSON.parse(urlsJson || '[]');
                const mainContainer = document.getElementById('main-image-container');
                const thumbContainer = document.getElementById('thumbnails-container');
                
                if (urls.length === 0) {
                    mainContainer.innerHTML = '<p style="color: var(--text-muted);">NO IMAGE AVAILABLE</p>';
                    thumbContainer.innerHTML = '';
                    return;
                }

                if (mainContainer.dataset.loadedIds !== urls.join(',')) {
                    mainContainer.dataset.loadedIds = urls.join(',');
                    mainContainer.innerHTML = '';
                    thumbContainer.innerHTML = '';

                    urls.forEach((url, index) => {
                        const img = document.createElement('img');
                        img.src = url;
                        if (index === 0) img.classList.add('active');
                        img.id = `main-img-${index}`;
                        mainContainer.appendChild(img);

                        const thumb = document.createElement('img');
                        thumb.src = url;
                        if (index === 0) thumb.classList.add('selected');
                        thumb.onclick = () => {
                            document.querySelectorAll('.image-container img').forEach(i => i.classList.remove('active'));
                            document.querySelectorAll('.thumbnails img').forEach(t => t.classList.remove('selected'));
                            img.classList.add('active');
                            thumb.classList.add('selected');
                        };
                        thumbContainer.appendChild(thumb);
                    });
                }
            } catch(e) {}
        }

        function updatePriceDisplay() {
            if (!currentItem) return;
            const currentBidYen = currentItem.current_bid || 0;
            const displayEl = document.getElementById('price-display');

            if (currentCurrency === 'USD') {
                const usdVal = (currentBidYen / exchangeRate).toFixed(2);
                displayEl.textContent = `$${Number(usdVal).toLocaleString('en-US', {minimumFractionDigits: 2})}`;
            } else {
                displayEl.textContent = `¥${currentBidYen.toLocaleString()}`;
            }
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const timerEl = document.getElementById('timer-display');
                if (remainingSeconds > 0) {
                    remainingSeconds--;
                    const mins = Math.floor(remainingSeconds / 60);
                    const secs = remainingSeconds % 60;
                    timerEl.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                } else {
                    timerEl.textContent = 'CLOSED';
                }
            }, 1000);
        }

        async function placeBid(amountUSD) {
            if (!currentItem) return;
            const amountYen = Math.round(amountUSD * exchangeRate);

            try {
                const res = await fetch('/api/bid', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        itemId: currentItem.id,
                        amount: amountYen,
                        clientId: currentClient.client_id
                    })
                });
                const data = await res.json();
                if (data.success) {
                    currentItem.current_bid = data.currentBid;
                    currentItem.highest_bidder = data.highestBidder;
                    updatePriceDisplay();
                    document.getElementById('highest-bidder').textContent = data.highestBidder;
                    pollActiveBids();
                } else {
                    alert(data.message || '入札に失敗しました。');
                }
            } catch (err) {
                alert('通信エラーが発生しました。');
            }
        }

        function openPurchasesModal() {
            document.getElementById('purchases-modal').classList.add('active');
            loadMyPurchases();
        }

        function closePurchasesModal() {
            document.getElementById('purchases-modal').classList.remove('active');
        }

        async function loadMyPurchases() {
            if (!currentClient) return;
            try {
                const res = await fetch(`/api/my-purchases?clientId=${encodeURIComponent(currentClient.client_id)}`);
                const items = await res.json();
                const gridEl = document.getElementById('purchases-grid');

                if (!items || items.length === 0) {
                    gridEl.innerHTML = '<p style="color:var(--text-muted); font-size:0.85em; grid-column:1/-1; text-align:center; padding:30px 0;">まだ落札した商品はありません。</p>';
                    return;
                }

                let html = '';
                items.forEach(item => {
                    let firstImg = '';
                    try {
                        const urls = JSON.parse(item.image_urls || '[]');
                        if (urls.length > 0) firstImg = urls[0];
                    } catch(e){}

                    const usdVal = (item.current_bid / exchangeRate).toFixed(2);

                    html += `
                        <div class="purchase-card">
                            ${firstImg ? `<img src="${firstImg}" alt="Product">` : '<div style="height:140px; background:#f8fafc; display:flex; align-items:center; justify-content:center; color:var(--text-muted); font-size:0.8em; margin-bottom:10px; border-radius:6px;">No Image</div>'}
                            <div style="font-size:0.75em; color:var(--gold-primary); font-weight:700; text-transform:uppercase;">${item.brand || ''}</div>
                            <div style="font-size:1em; font-weight:700; margin-bottom:6px;">${item.item_code}</div>
                            <div style="font-size:0.8em; color:var(--text-muted); margin-bottom:10px;">${item.item_memo || ''}</div>
                            <div style="margin-top:auto; font-size:1.1em; font-weight:800; color:var(--emerald-green);">
                                $${Number(usdVal).toLocaleString('en-US', {minimumFractionDigits: 2})} <span style="font-size:0.75em; color:var(--text-secondary); font-weight:normal;">(¥${Number(item.current_bid).toLocaleString()})</span>
                            </div>
                        </div>
                    `;
                });
                gridEl.innerHTML = html;
            } catch(e) {}
        }

        async function init() {
            await fetchSettings();
            pollActiveItem();
            pollActiveBids();
            setInterval(pollActiveItem, 2000);
            setInterval(pollActiveBids, 2000);
        }

        init();
    </script>
</body>
</html>
