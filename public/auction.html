<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="page-title">VIP Private Auction — Live Hall</title>
    <link rel="stylesheet" href="style.css">
    <style>
        button, .btn, input, select, .currency-btn {
            touch-action: manipulation;
        }

        .auction-layout-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 20px 60px;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding: 14px 20px;
        }

        .client-badge {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .client-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--gold-gradient);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9em;
            box-shadow: 0 2px 8px rgba(184, 134, 11, 0.3);
        }

        .client-info-text {
            font-size: 0.85em;
            color: var(--text-secondary);
        }

        .client-info-id {
            color: var(--gold-primary);
            font-weight: 700;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .currency-toggle {
            display: flex;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 999px;
            border: 1px solid rgba(184, 134, 11, 0.2);
        }

        .currency-btn {
            padding: 6px 16px;
            border: none;
            border-radius: 999px;
            background: transparent;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.8em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .currency-btn.active {
            background: var(--gold-gradient);
            color: #ffffff;
            box-shadow: 0 2px 10px rgba(184, 134, 11, 0.3);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 24px;
        }

        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .auction-card {
            padding: 32px;
            text-align: center;
            position: relative;
        }

        .brand-header {
            margin-bottom: 6px;
        }

        .brand-name {
            font-size: 1.1em;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: var(--gold-primary);
            text-transform: uppercase;
        }

        .item-title {
            font-size: 1.5em;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .item-memo-box {
            background: rgba(184, 134, 11, 0.06);
            border-left: 4px solid var(--gold-primary);
            padding: 10px 16px;
            border-radius: 4px;
            font-size: 0.85em;
            color: var(--text-secondary);
            text-align: left;
            margin: 0 auto 20px;
            word-break: break-all;
        }

        .image-container {
            position: relative;
            width: 100%;
            height: 340px;
            background: #ffffff;
            border-radius: var(--radius-md);
            border: 1px solid rgba(0, 0, 0, 0.08);
            overflow: hidden;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.02);
            cursor: zoom-in;
        }

        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none;
            transition: opacity 0.3s ease;
        }

        .image-container img.active {
            display: block;
        }

        /* 待機画面専用スタイル */
        .waiting-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            gap: 12px;
        }

        .waiting-icon {
            font-size: 3em;
            animation: pulse-slow 2s infinite ease-in-out;
        }

        @keyframes pulse-slow {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .zoom-hint {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 2px 8px;
            font-size: 0.75em;
            border-radius: 4px;
            pointer-events: none;
        }

        #image-zoom-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            cursor: zoom-out;
        }

        #image-zoom-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            object-fit: contain;
        }

        .thumbnails {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .thumbnails img {
            width: 56px;
            height: 56px;
            object-fit: cover;
            border-radius: var(--radius-sm);
            cursor: pointer;
            border: 2px solid transparent;
            opacity: 0.7;
            transition: all 0.2s ease;
            background: #ffffff;
        }

        .thumbnails img:hover {
            opacity: 1;
        }

        .thumbnails img.selected {
            border-color: var(--gold-primary);
            opacity: 1;
            box-shadow: 0 0 10px rgba(184, 134, 11, 0.3);
        }

        .auction-status-bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
            background: #f8fafc;
            padding: 16px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(184, 134, 11, 0.15);
        }

        .status-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .status-label {
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 4px;
            font-weight: 700;
        }

        .timer-val {
            font-family: var(--font-serif);
            font-size: 1.4em;
            font-weight: 700;
            color: var(--rose-red);
        }

        .extension-notice {
            color: #d97706;
            font-size: 0.85em;
            font-weight: bold;
            text-align: center;
            margin-bottom: 12px;
            background: #fef3c7;
            border: 1px solid #f59e0b;
            padding: 6px;
            border-radius: 4px;
            display: none;
            animation: pulse 1s infinite;
        }

        .price-val {
            font-family: var(--font-sans);
            font-size: 1.8em;
            font-weight: 800;
            color: var(--emerald-green);
        }

        .highest-bidder-box {
            font-size: 0.85em;
            color: var(--text-secondary);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 600;
        }

        .win-banner {
            background: linear-gradient(135deg, #d4af37, #aa7c11);
            color: #ffffff;
            padding: 16px;
            border-radius: var(--radius-sm);
            text-align: center;
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 24px;
            box-shadow: 0 4px 15px rgba(184, 134, 11, 0.4);
            animation: pulse 1.5s infinite;
            display: none;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .bid-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .bid-btn {
            padding: 16px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-md);
            font-size: 1.1em;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .bid-btn span.usd-amt {
            font-size: 0.7em;
            font-weight: 400;
            opacity: 0.8;
            margin-top: 4px;
        }

        .sidebar-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .history-card {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-height: 480px;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 10px;
            border-bottom: 1px dashed #e2e8f0;
            font-size: 0.9em;
        }

        .history-item.is-me {
            background: rgba(16, 185, 129, 0.05);
            border-left: 3px solid var(--emerald-green);
        }

        .history-bidder {
            font-weight: 600;
            color: var(--text-secondary);
        }
        
        .history-bidder.is-me {
            color: var(--emerald-green);
        }

        .history-amount {
            font-weight: 700;
            color: var(--text-primary);
        }

        .loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(184, 134, 11, 0.2);
            border-top-color: var(--gold-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="loading-screen" id="loading-screen">
        <div class="spinner"></div>
        <p style="color:var(--text-secondary); font-size:0.9em; letter-spacing:0.1em; text-transform:uppercase;">Loading Auction Hall...</p>
    </div>

    <div id="image-zoom-modal" onclick="closeImageZoom()">
        <img id="zoomed-image" src="" alt="Zoomed">
    </div>

    <div class="auction-layout-container">
        <div class="header-bar glass-panel animate-slide-up">
            <div class="client-badge">
                <div class="client-avatar" id="avatar-initial">C</div>
                <div class="client-info-text">
                    Logged in as<br>
                    <span class="client-info-id" id="display-client-name">---</span>
                </div>
            </div>
            <div class="header-actions">
                <div class="currency-toggle">
                    <button class="currency-btn active" id="cur-jpy" onclick="setCurrency('JPY')">JPY</button>
                    <button class="currency-btn" id="cur-usd" onclick="setCurrency('USD')">USD</button>
                </div>
                <button onclick="location.href='mypage.html'" class="btn btn-secondary" style="padding: 8px 16px; font-size: 0.85em;">My Page</button>
            </div>
        </div>

        <div class="main-grid">
            <div class="auction-card glass-panel animate-fade-in" style="animation-delay: 0.1s;">
                <div class="brand-header">
                    <span class="badge badge-gold" id="brand-badge">WAITING</span>
                </div>
                <h2 class="item-title font-serif" id="item-name">次の商品の出品をお待ちください</h2>
                
                <div class="item-memo-box" id="item-memo-container" style="display: none;">
                    <span id="item-memo-text"></span>
                </div>

                <!-- 待機画面時のプレースホルダーを含む画像コンテナ -->
                <div class="image-container" id="main-image-container" onclick="openImageZoom()">
                    <div id="waiting-placeholder" class="waiting-placeholder">
                        <div class="waiting-icon">⏳</div>
                        <p style="font-weight: 600; font-size: 0.95em; color: var(--gold-primary);">VIP PRIVATE AUCTION</p>
                        <p style="font-size: 0.8em; color: var::var(--text-muted);">まもなく次のオークションが開始されます</p>
                    </div>
                    <img src="" id="main-image" alt="商品画像">
                    <div class="zoom-hint" id="zoom-hint" style="display: none;">🔍 Tap to Zoom</div>
                </div>
                
                <div class="thumbnails" id="thumbnail-container"></div>

                <div id="win-banner" class="win-banner">
                    🎉 CONGRATULATIONS! YOU WON THIS ITEM! 🎉
                </div>

                <div class="auction-status-bar">
                    <div class="status-box">
                        <span class="status-label" id="timer-label">Time Left</span>
                        <div class="timer-val" id="time-left">--:--</div>
                    </div>
                    <div class="status-box">
                        <span class="status-label" id="price-label">Current Bid</span>
                        <div class="price-val" id="current-price">¥0</div>
                        <div style="font-size: 0.8em; color: var(--text-muted); font-weight:600; margin-top:2px;" id="current-price-usd">($0)</div>
                    </div>
                </div>
                
                <div id="extension-notice" class="extension-notice">
                    ⏱ 終了直前の入札により、時間が5秒延長されました！
                </div>

                <div class="highest-bidder-box">
                    <span>👑 Highest Bidder:</span>
                    <span id="highest-bidder-id" style="color: var(--gold-primary); font-size: 1.1em;">---</span>
                </div>

                <div class="bid-buttons">
                    <button class="btn btn-primary bid-btn" onclick="placeBid(1000)" id="btn-bid-1k">
                        + ¥1,000
                        <span class="usd-amt" id="usd-amt-1k"></span>
                    </button>
                    <button class="btn btn-primary bid-btn" onclick="placeBid(5000)" id="btn-bid-5k">
                        + ¥5,000
                        <span class="usd-amt" id="usd-amt-5k"></span>
                    </button>
                    <button class="btn btn-gold bid-btn" onclick="placeBid(10000)" id="btn-bid-10k">
                        + ¥10,000
                        <span class="usd-amt" id="usd-amt-10k"></span>
                    </button>
                </div>
            </div>

            <div class="sidebar-panel animate-fade-in" style="animation-delay: 0.2s;">
                <div class="glass-panel history-card">
                    <h3 class="font-serif" style="font-size: 1.1em; border-bottom: 1px solid #e2e8f0; padding-bottom: 12px; margin-bottom: 12px; color: var(--text-primary);">
                        Bid History
                    </h3>
                    <div class="history-list" id="bid-history">
                        <div style="text-align: center; color: #94a3b8; font-size: 0.85em; padding: 20px;">履歴はありません</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentClient = null;
        let activeItemId = null;
        let exchangeRate = 150;
        let currentCurrency = 'JPY';
        let currentBidPrice = 0;
        let lastImages = [];
        let timeRemainingInterval;
        let targetEndTime = null;
        
        const texts = {
            'JPY': { timer: 'Time Left', price: 'Current Bid', wait: '次の商品の出品をお待ちください' },
            'USD': { timer: 'Time Left', price: 'Current Bid', wait: 'Waiting for next item...' }
        };

        const savedClient = localStorage.getItem('auctionClient');
        if (!savedClient) {
            alert('ログインしてください。');
            location.href = 'index.html';
        } else {
            currentClient = JSON.parse(savedClient);
            const clientName = currentClient.client_name || currentClient.client_id || 'User';
            document.getElementById('display-client-name').textContent = clientName;
            document.getElementById('avatar-initial').textContent = clientName.charAt(0).toUpperCase();
        }

        async function sendHeartbeat() {
            if (!currentClient) return;
            const clientIdToSend = (typeof currentClient === 'string') 
                ? currentClient 
                : (currentClient.client_id || currentClient.clientId || currentClient.id);

            try {
                await fetch('/api/heartbeat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ clientId: clientIdToSend })
                });
            } catch(e) {}
        }

        async function init() {
            updateTexts();
            await fetchSettings();
            pollActiveItem();
            pollActiveBids();
            
            sendHeartbeat();
            
            setInterval(pollActiveItem, 2000);
            setInterval(pollActiveBids, 2000);
            setInterval(sendHeartbeat, 10000);

            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 300);
            }, 800);
        }

        async function fetchSettings() {
            try {
                const res = await fetch('/api/settings');
                const data = await res.json();
                exchangeRate = Number(data.exchangeRate) || 150;
                updateBidButtonUSD();
            } catch(e) {}
        }

        function setCurrency(cur) {
            currentCurrency = cur;
            document.getElementById('cur-jpy').classList.remove('active');
            document.getElementById('cur-usd').classList.remove('active');
            document.getElementById(`cur-${cur.toLowerCase()}`).classList.add('active');
            updateTexts();
            updatePriceDisplay();
        }

        function updateTexts() {
            document.getElementById('timer-label').textContent = texts[currentCurrency].timer;
            document.getElementById('price-label').textContent = texts[currentCurrency].price;
        }

        function updateBidButtonUSD() {
            document.getElementById('usd-amt-1k').textContent = `(Approx $${Math.floor(1000/exchangeRate)})`;
            document.getElementById('usd-amt-5k').textContent = `(Approx $${Math.floor(5000/exchangeRate)})`;
            document.getElementById('usd-amt-10k').textContent = `(Approx $${Math.floor(10000/exchangeRate)})`;
        }

        function openImageZoom() {
            const mainImg = document.getElementById('main-image');
            if(mainImg.src && mainImg.style.display === 'block' && !mainImg.src.includes('placeholder.jpg')) {
                document.getElementById('zoomed-image').src = mainImg.src;
                document.getElementById('image-zoom-modal').style.display = 'flex';
            }
        }
        function closeImageZoom() {
            document.getElementById('image-zoom-modal').style.display = 'none';
        }

        async function pollActiveItem() {
            try {
                const res = await fetch('/api/items/active');
                const data = await res.json();
                const item = data.item;
                const serverTime = data.serverTime;

                if (item) {
                    if (activeItemId !== item.id) {
                        activeItemId = item.id;
                        document.getElementById('brand-badge').textContent = item.brand || 'BRAND';
                        document.getElementById('item-name').textContent = item.item_code || '---';
                        
                        if (item.item_memo) {
                            document.getElementById('item-memo-container').style.display = 'block';
                            document.getElementById('item-memo-text').textContent = item.item_memo;
                        } else {
                            document.getElementById('item-memo-container').style.display = 'none';
                        }
                        
                        document.getElementById('win-banner').style.display = 'none';
                        enableButtons(true);
                        updateImages(item.image_urls);
                    }

                    if (targetEndTime && item.expires_at > targetEndTime) {
                        showExtensionNotice();
                    }
                    targetEndTime = item.expires_at;

                    updateTimer(serverTime);

                    currentBidPrice = item.current_bid || 0;
                    updatePriceDisplay();

                    const highestId = item.highest_bidder || '---';
                    const clientId = typeof currentClient === 'string' ? currentClient : currentClient.client_id;
                    const highestEl = document.getElementById('highest-bidder-id');
                    
                    if (highestId === clientId) {
                        highestEl.textContent = 'YOU (Top Bidder)';
                        highestEl.style.color = 'var(--emerald-green)';
                    } else {
                        highestEl.textContent = highestId;
                        highestEl.style.color = 'var(--gold-primary)';
                    }

                } else {
                    activeItemId = null;
                    document.getElementById('brand-badge').textContent = 'WAITING';
                    document.getElementById('item-name').textContent = texts[currentCurrency].wait;
                    document.getElementById('item-memo-container').style.display = 'none';
                    document.getElementById('time-left').textContent = '--:--';
                    document.getElementById('current-price').textContent = '¥0';
                    document.getElementById('current-price-usd').textContent = '($0)';
                    document.getElementById('highest-bidder-id').textContent = '---';
                    document.getElementById('win-banner').style.display = 'none';
                    
                    // 待機画面の表示切り替え
                    document.getElementById('waiting-placeholder').style.display = 'flex';
                    document.getElementById('main-image').style.display = 'none';
                    document.getElementById('zoom-hint').style.display = 'none';
                    document.getElementById('thumbnail-container').innerHTML = '';
                    
                    enableButtons(false);
                }
            } catch(e) {}
        }

        function showExtensionNotice() {
            const notice = document.getElementById('extension-notice');
            notice.style.display = 'block';
            setTimeout(() => { notice.style.display = 'none'; }, 3000);
        }

        function updateTimer(serverTime) {
            clearInterval(timeRemainingInterval);
            
            const renderTime = () => {
                if (!targetEndTime) return;
                let diff = Math.floor((targetEndTime - serverTime) / 1000);
                serverTime += 1000;
                
                if (diff <= 0) {
                    document.getElementById('time-left').textContent = '00:00';
                    document.getElementById('time-left').style.color = 'var(--text-muted)';
                    enableButtons(false);
                    checkAndNextItem();
                    clearInterval(timeRemainingInterval);
                    return;
                }

                if (diff <= 10) {
                    document.getElementById('time-left').style.color = 'var(--rose-red)';
                    document.getElementById('time-left').style.animation = 'pulse 1s infinite';
                } else {
                    document.getElementById('time-left').style.color = 'var(--text-primary)';
                    document.getElementById('time-left').style.animation = 'none';
                }

                const m = String(Math.floor(diff / 60)).padStart(2, '0');
                const s = String(diff % 60).padStart(2, '0');
                document.getElementById('time-left').textContent = `${m}:${s}`;
            };
            
            renderTime();
            timeRemainingInterval = setInterval(renderTime, 1000);
        }

        async function checkAndNextItem() {
            if (!activeItemId) return;
            const res = await fetch('/api/items/check-and-next', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ itemId: activeItemId })
            });
            const data = await res.json();
            
            if (data.transitioned) {
                const highestId = document.getElementById('highest-bidder-id').textContent;
                const clientIdStr = typeof currentClient === 'string' ? currentClient : currentClient.client_id;
                
                if (highestId.includes('YOU') || highestId === clientIdStr) {
                    document.getElementById('win-banner').style.display = 'block';
                }

                setTimeout(() => {
                    pollActiveItem();
                    document.getElementById('bid-history').innerHTML = '<div style="text-align: center; color: #94a3b8; font-size: 0.85em; padding: 20px;">履歴はありません</div>';
                }, 3000);
            }
        }

        function enableButtons(enabled) {
            const btns = document.querySelectorAll('.bid-btn');
            btns.forEach(b => {
                b.disabled = !enabled;
                if(!enabled) {
                    b.style.opacity = '0.5';
                    b.style.cursor = 'not-allowed';
                } else {
                    b.style.opacity = '1';
                    b.style.cursor = 'pointer';
                }
            });
        }

        function updatePriceDisplay() {
            const jpyStr = '¥' + currentBidPrice.toLocaleString();
            const usdVal = Math.floor(currentBidPrice / exchangeRate);
            const usdStr = '($' + usdVal.toLocaleString() + ')';

            if (currentCurrency === 'JPY') {
                document.getElementById('current-price').textContent = jpyStr;
                document.getElementById('current-price-usd').textContent = usdStr;
            } else {
                document.getElementById('current-price').textContent = '$' + usdVal.toLocaleString();
                document.getElementById('current-price-usd').textContent = '(' + jpyStr + ')';
            }
        }

        function updateImages(urlsJson) {
            if (urlsJson === lastImages) return;
            lastImages = urlsJson;
            let urls = [];
            try { urls = JSON.parse(urlsJson || '[]'); } catch(e) {}

            const thumbContainer = document.getElementById('thumbnail-container');
            const mainImg = document.getElementById('main-image');
            const waitingPlaceholder = document.getElementById('waiting-placeholder');
            const zoomHint = document.getElementById('zoom-hint');
            thumbContainer.innerHTML = '';

            if (urls.length === 0) {
                waitingPlaceholder.style.display = 'flex';
                mainImg.style.display = 'none';
                zoomHint.style.display = 'none';
                return;
            }

            waitingPlaceholder.style.display = 'none';
            mainImg.style.display = 'block';
            zoomHint.style.display = 'block';
            mainImg.src = urls[0];
            
            urls.forEach((url, idx) => {
                const img = document.createElement('img');
                img.src = url;
                if (idx === 0) img.classList.add('selected');
                img.onclick = () => {
                    mainImg.src = url;
                    document.querySelectorAll('.thumbnails img').forEach(i => i.classList.remove('selected'));
                    img.classList.add('selected');
                };
                thumbContainer.appendChild(img);
            });
        }

        async function pollActiveBids() {
            if (!activeItemId) return;
            try {
                const res = await fetch('/api/bids/active');
                const bids = await res.json();
                renderBids(bids);
            } catch(e) {}
        }

        function renderBids(bids) {
            const container = document.getElementById('bid-history');
            container.innerHTML = '';
            
            if (!bids || bids.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #94a3b8; font-size: 0.85em; padding: 20px;">履歴はありません</div>';
                return;
            }

            const clientIdStr = typeof currentClient === 'string' ? currentClient : currentClient.client_id;
            
            bids.forEach(b => {
                const isMe = b.client_id === clientIdStr;
                const div = document.createElement('div');
                div.className = `history-item ${isMe ? 'is-me' : ''}`;
                
                const time = new Date(b.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
                
                div.innerHTML = `
                    <div style="display:flex; flex-direction:column; gap:2px;">
                        <span class="history-bidder ${isMe ? 'is-me' : ''}">${isMe ? 'YOU' : b.client_id}</span>
                        <span style="font-size:0.7em; color:#94a3b8;">${time}</span>
                    </div>
                    <span class="history-amount">¥${b.amount.toLocaleString()}</span>
                `;
                container.appendChild(div);
            });
        }

        async function placeBid(amount) {
            if (!activeItemId) return;
            
            const clientIdStr = typeof currentClient === 'string' ? currentClient : currentClient.client_id;
            const res = await fetch('/api/bid', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    itemId: activeItemId,
                    amount: amount,
                    clientId: clientIdStr
                })
            });
            const data = await res.json();
            if (data.success) {
                currentBidPrice = data.currentBid;
                updatePriceDisplay();
                pollActiveBids();
                
                if (data.extended) {
                    targetEndTime = data.newExpiresAt;
                    showExtensionNotice();
                }
            } else {
                alert(data.message || '入札エラー');
            }
        }

        window.onload = init;
    </script>
</body>
</html>
